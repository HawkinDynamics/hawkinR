name: Create Sync PR
on:
  push:
    branches:
      - sync/monorepo-updates

permissions:
  pull-requests: write
  contents: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Check if a PR already exists for this branch to avoid errors
          PR_EXISTS=$(gh pr list --head sync/monorepo-updates --base main --state open --json number -q '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --title "Automated Sync from Monorepo" \
              --body "This PR contains updated code and documentation synced from the private Hawkin Connect monorepo. Please review and merge to update the public R package." \
              --base main \
              --head sync/monorepo-updates
            echo "New Pull Request created."
          else
            echo "Pull Request #$PR_EXISTS already exists. Skipping creation."
          fi